{% extends "base.html" %}
{% block title %}New bookmark{% endblock %}
{% block content %}
  <h1>New bookmark</h1>
  <form method="post" action="/bookmarks">
    <p>
      <label>
        Title<br><input type="text" name="title" required placeholder="Title" size="60">
      </label>
    </p>
    <p>
      <label>
        URL<br><input type="url" name="url" required placeholder="https://example.com" size="60">
      </label>
    </p>
    <p>
      <label>
        Tags (comma-separated)<br><input type="text" name="tags" placeholder="rust, async" size="60">
      </label>
    </p>
    <p><button type="submit">Save</button></p>
  </form>
{% endblock %}
